spring:
  application:
    name: capitalot-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:capitalot}
    username: ${DB_USER:capitalot}
    password: ${DB_PASSWORD:capitalot}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=60s
    cache-names:
      - stockQuotes
      - dailyTimeSeries
      - intradayTimeSeries
      - symbolSearch
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000
  
  stock-api:
    finnhub:
      api-key: ${FINNHUB_API_KEY:}
    alpha-vantage:
      api-key: ${ALPHA_VANTAGE_API_KEY:}

  cache:
    stock-quotes-ttl: 60
    daily-time-series-ttl: 3600
    intraday-time-series-ttl: 300
    symbol-search-ttl: 86400

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

logging:
  level:
    com.capitalot.service.YahooFinanceService: DEBUG
    com.capitalot.service.StockPriceService: DEBUG
    com.capitalot.service.StockEnrichmentService: DEBUG
